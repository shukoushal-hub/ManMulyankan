<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Dashboard — ManMulyankan</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1e2028;--card:#2a2d35;--border:#363840;--navy:#eaecf0;--ink:#c8ccd4;--slate:#9498a4;--grey:#70747e;--blue:#6b8aff;--blue-d:#5570d9;--green:#5ec49a;--red:#f07070;--yellow:#f0b830;--r:12px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 28px;background:rgba(30,32,40,.95);border-bottom:1px solid rgba(107,138,255,.1);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.tb-logo{width:32px;height:32px;background:var(--blue);border-radius:8px;position:relative;overflow:hidden}
.tb-logo::before{content:'';position:absolute;top:5px;left:5px;width:8px;height:8px;border:2px solid rgba(255,255,255,.7);border-radius:50%}
.tb-t{font-size:.9rem;font-weight:800;color:var(--navy)}.tb-s{font-size:.6rem;color:var(--grey)}
.tb-right{margin-left:auto;display:flex;gap:10px;align-items:center}
.tb-btn{padding:6px 14px;font-size:.76rem;font-weight:600;color:var(--slate);background:var(--card);border:1px solid var(--border);border-radius:8px;text-decoration:none;cursor:pointer;font-family:var(--font);transition:all .2s}
.tb-btn:hover{border-color:var(--blue);color:var(--blue)}
.tb-btn.danger{color:var(--red);border-color:rgba(240,112,112,.2)}
.tb-btn.danger:hover{background:var(--red);color:#fff}
.wrap{max-width:1100px;margin:0 auto;padding:28px 24px 60px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);padding:20px;text-align:center}
.stat-val{font-size:2rem;font-weight:900;color:var(--navy);font-family:var(--mono)}
.stat-label{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);margin-top:4px}
.stat.s1 .stat-val{color:var(--blue)}.stat.s2 .stat-val{color:var(--green)}.stat.s3 .stat-val{color:var(--yellow)}.stat.s4 .stat-val{color:#b49dff}
.toolbar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;padding:10px 16px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--navy);font-family:var(--font);font-size:.88rem;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--blue)}
.filter-sel{padding:10px 16px;border:1.5px solid var(--border);border-radius:var(--r);background:var(--card);color:var(--ink);font-family:var(--font);font-size:.82rem;outline:none;cursor:pointer}
.table-wrap{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{font-size:.66rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--grey);padding:14px 16px;text-align:left;border-bottom:1px solid var(--border);background:rgba(54,56,64,.3)}
td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:.85rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(107,138,255,.03)}
.test-badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:.66rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.t-depression{background:rgba(91,184,245,.12);color:#5bb8f5}
.t-trail{background:rgba(180,157,255,.12);color:#b49dff}
.t-stroop{background:rgba(240,112,112,.12);color:#f07070}
.t-digit{background:rgba(94,196,154,.12);color:#5ec49a}
.t-qol{background:rgba(240,184,48,.12);color:#f0b830}
.score-pill{font-family:var(--mono);font-weight:700;font-size:.82rem;color:var(--navy)}
.act-btn{padding:4px 10px;font-size:.72rem;font-weight:600;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--slate);cursor:pointer;font-family:var(--font);transition:all .15s;margin-right:4px}
.act-btn:hover{border-color:var(--blue);color:var(--blue)}
.act-btn.del:hover{border-color:var(--red);color:var(--red)}
.empty{text-align:center;padding:48px;color:var(--grey);font-size:.9rem}
.pagination{display:flex;justify-content:center;gap:8px;margin-top:20px}
.pg-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--slate);cursor:pointer;font-family:var(--font);font-size:.82rem;transition:all .2s}
.pg-btn:hover,.pg-btn.active{border-color:var(--blue);color:var(--blue)}
.pg-btn:disabled{opacity:.3;cursor:not-allowed}
/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:500;display:none;place-items:center}
.modal-bg.show{display:grid}
.modal{background:var(--card);border:1.5px solid var(--border);border-radius:16px;padding:32px;max-width:640px;width:90%;max-height:80vh;overflow-y:auto;animation:mIn .3s ease}
@keyframes mIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal h3{font-size:1.1rem;font-weight:800;color:var(--navy);margin-bottom:16px}
.modal-close{float:right;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--grey);cursor:pointer;font-family:var(--font);font-size:.82rem}
.modal-close:hover{border-color:var(--red);color:var(--red)}
.detail-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.detail-row:last-child{border-bottom:none}
.dl{color:var(--grey);font-weight:600}.dv{color:var(--navy);font-weight:700;font-family:var(--mono);text-align:right;max-width:60%;word-break:break-word}
.json-block{background:rgba(30,32,40,.8);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:var(--mono);font-size:.75rem;color:var(--ink);max-height:300px;overflow:auto;white-space:pre-wrap;margin-top:12px;line-height:1.6}
@media(max-width:768px){.stats{grid-template-columns:1fr 1fr}.toolbar{flex-direction:column}table{font-size:.78rem}th,td{padding:10px 12px}}
</style>
</head>
<body>
<div class="topbar">
  <div class="tb-logo"></div>
  <div><div class="tb-t">ManMulyankan</div><div class="tb-s">Admin Dashboard</div></div>
  <div class="tb-right">
    <a class="tb-btn" href="/">View Tests</a>
    <a class="tb-btn" href="/api/admin/export">Export CSV</a>
    <a class="tb-btn danger" href="/admin/logout">Logout</a>
  </div>
</div>
<div class="wrap">
  <!-- Stats -->
  <div class="stats">
    <div class="stat s1"><div class="stat-val" id="stTotal">-</div><div class="stat-label">Total Sessions</div></div>
    <div class="stat s2"><div class="stat-val" id="stParticipants">-</div><div class="stat-label">Participants</div></div>
    <div class="stat s3"><div class="stat-val" id="stToday">-</div><div class="stat-label">Today</div></div>
    <div class="stat s4"><div class="stat-val" id="stTests">-</div><div class="stat-label">Test Types</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <input class="search-box" id="searchBox" placeholder="Search participant name...">
    <select class="filter-sel" id="filterTest">
      <option value="all">All Tests</option>
      <option value="depression_screening">Depression Screening</option>
      <option value="trail_making">Trail Making</option>
      <option value="stroop_test">Stroop Test</option>
      <option value="digit_span">Digit Span</option>
      <option value="quality_of_life">Quality of Life</option>
      <option value="wisc_v">WISC-V (5-16)</option>
      <option value="wais_v_young">WAIS-V (17-30)</option>
      <option value="wais_v_adult">WAIS-V (31-55)</option>
      <option value="moca">MoCA (56+)</option>
    </select>
  </div>

  <!-- Results Table -->
  <div class="table-wrap">
    <table>
      <thead><tr><th>Participant</th><th>Age</th><th>Test</th><th>Date</th><th>Key Score</th><th>Actions</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pagination" id="pagination"></div>
</div>

<!-- Detail Modal -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">Close</button>
    <h3 id="modalTitle">Result Detail</h3>
    <div id="modalBody"></div>
  </div>
</div>

<script>
var PAGE_SIZE = 20, currentPage = 0;

async function loadStats() {
  try {
    var res = await fetch('/api/admin/stats');
    var d = await res.json();
    document.getElementById('stTotal').textContent = d.totalSessions;
    document.getElementById('stParticipants').textContent = d.totalParticipants;
    document.getElementById('stToday').textContent = d.todayCount;
    document.getElementById('stTests').textContent = d.byTest.length;
  } catch(e) { console.error(e); }
}

function testBadgeClass(t) {
  if (t.includes('depression')) return 't-depression';
  if (t.includes('trail')) return 't-trail';
  if (t.includes('stroop')) return 't-stroop';
  if (t.includes('digit')) return 't-digit';
  if (t.includes('quality')) return 't-qol';
  return '';
}

function testLabel(t) {
  return t.replace(/_/g, ' ').replace(/\b\w/g, function(c){return c.toUpperCase();});
}

function getKeyScore(row) {
  var s = row.scores;
  if (!s || typeof s !== 'object') return '--';
  if (s.totalScore !== undefined) return s.totalScore + '/63';
  if (s.overallScore !== undefined) return s.overallScore + '/100';
  if (s.stroopEffect_ms !== undefined) return s.stroopEffect_ms + 'ms';
  if (s.combined !== undefined) {
    if (typeof s.combined === 'object') return s.combined.score + '/30';
    return s.combined + '/30';
  }
  if (s.domainScores) {
    var vals = Object.values(s.domainScores);
    if (vals.length && vals[0].score !== undefined) {
      var avg = Math.round(vals.reduce(function(a,v){return a+v.score},0)/vals.length);
      return avg + '/100';
    }
  }
  return '--';
}

function fmtDate(d) {
  if (!d) return '--';
  var dt = new Date(d);
  return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) + ' ' + dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
}

async function loadResults() {
  var search = document.getElementById('searchBox').value;
  var test = document.getElementById('filterTest').value;
  var offset = currentPage * PAGE_SIZE;
  try {
    var res = await fetch('/api/admin/results?test_type='+test+'&search='+encodeURIComponent(search)+'&limit='+PAGE_SIZE+'&offset='+offset);
    var d = await res.json();
    var tb = document.getElementById('tbody');
    if (d.results.length === 0) {
      tb.innerHTML = '<tr><td colspan="6" class="empty">No results found</td></tr>';
    } else {
      tb.innerHTML = d.results.map(function(r) {
        return '<tr>'+
          '<td style="font-weight:700;color:var(--navy)">'+r.participant_name+'</td>'+
          '<td>'+(r.participant_age||'--')+'</td>'+
          '<td><span class="test-badge '+testBadgeClass(r.test_type)+'">'+testLabel(r.test_type)+'</span></td>'+
          '<td style="font-size:.8rem;color:var(--grey)">'+fmtDate(r.completed_at)+'</td>'+
          '<td><span class="score-pill">'+getKeyScore(r)+'</span></td>'+
          '<td><button class="act-btn" onclick="viewDetail('+r.id+')">View</button><button class="act-btn del" onclick="deleteResult('+r.id+')">Delete</button></td>'+
          '</tr>';
      }).join('');
    }
    // Pagination
    var totalPages = Math.ceil(d.total / PAGE_SIZE);
    var pgEl = document.getElementById('pagination');
    pgEl.innerHTML = '';
    if (totalPages > 1) {
      for (var i = 0; i < totalPages; i++) {
        pgEl.innerHTML += '<button class="pg-btn'+(i===currentPage?' active':'')+'" onclick="goPage('+i+')">'+(i+1)+'</button>';
      }
    }
  } catch(e) { console.error(e); }
}

function goPage(p) { currentPage = p; loadResults(); }

async function viewDetail(id) {
  try {
    var res = await fetch('/api/admin/results/'+id);
    var d = await res.json();
    document.getElementById('modalTitle').textContent = d.participant_name + ' — ' + testLabel(d.test_type);
    var html = '';
    html += '<div class="detail-row"><span class="dl">Participant</span><span class="dv">'+d.participant_name+'</span></div>';
    html += '<div class="detail-row"><span class="dl">Age</span><span class="dv">'+(d.participant_age||'--')+'</span></div>';
    html += '<div class="detail-row"><span class="dl">Test</span><span class="dv">'+testLabel(d.test_type)+'</span></div>';
    html += '<div class="detail-row"><span class="dl">Started</span><span class="dv">'+fmtDate(d.started_at)+'</span></div>';
    html += '<div class="detail-row"><span class="dl">Completed</span><span class="dv">'+fmtDate(d.completed_at)+'</span></div>';
    if (d.interpretation) html += '<div class="detail-row"><span class="dl">Interpretation</span><span class="dv">'+d.interpretation+'</span></div>';
    html += '<h4 style="margin-top:16px;font-size:.82rem;color:var(--grey);font-weight:700">SCORES</h4>';
    html += '<div class="json-block">'+JSON.stringify(d.scores, null, 2)+'</div>';
    html += '<h4 style="margin-top:16px;font-size:.82rem;color:var(--grey);font-weight:700">RAW ANSWERS</h4>';
    html += '<div class="json-block">'+JSON.stringify(d.raw_answers, null, 2)+'</div>';
    document.getElementById('modalBody').innerHTML = html;
    document.getElementById('modalBg').classList.add('show');
  } catch(e) { console.error(e); }
}

function closeModal() { document.getElementById('modalBg').classList.remove('show'); }
document.getElementById('modalBg').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

async function deleteResult(id) {
  if (!confirm('Delete this result permanently?')) return;
  await fetch('/api/admin/results/'+id, {method:'DELETE'});
  loadResults(); loadStats();
}

// Debounced search
var searchTimer;
document.getElementById('searchBox').addEventListener('input', function() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(function(){ currentPage=0; loadResults(); }, 300);
});
document.getElementById('filterTest').addEventListener('change', function() { currentPage=0; loadResults(); });

// Init
loadStats();
loadResults();
</script>
</body>
</html>
